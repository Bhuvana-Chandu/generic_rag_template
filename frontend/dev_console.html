<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛠️ RAG Developer Console</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050d1e;color:#e2e8f0;font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

.header{display:flex;align-items:center;gap:12px;padding:12px 24px;background:#0a1628;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.header h1{font-size:1rem;font-weight:600;color:#fff}
.badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px;background:#6366f1;color:#fff;letter-spacing:.06em}
.session-id{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.68rem;color:#475569;background:rgba(255,255,255,0.04);padding:3px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.06)}

.body{display:flex;flex:1;overflow:hidden}

/* LEFT PANEL */
.left{width:320px;min-width:300px;border-right:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;background:#07122a}
.query-area{padding:16px;border-bottom:1px solid rgba(255,255,255,0.07)}
.query-area label{display:block;font-size:.65rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.query-area textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px;color:#e2e8f0;font-family:'Inter',sans-serif;font-size:.85rem;resize:none;outline:none;transition:border-color .2s}
.query-area textarea:focus{border-color:#6366f1}
.run-btn{width:100%;margin-top:8px;padding:10px;background:linear-gradient(135deg,#6366f1,#818cf8);border:none;border-radius:8px;color:#fff;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}

.intent-display{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.07);display:none}
.intent-display label{font-size:.65rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.08em}
.intent-pill{display:inline-block;margin-top:6px;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;background:rgba(99,102,241,.2);color:#a5b4fc;border:1px solid rgba(99,102,241,.3)}

.log-area{flex:1;overflow-y:auto;padding:12px 16px}
.log-area label{font-size:.65rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:8px}
.log-entry{display:flex;gap:8px;margin-bottom:8px;animation:slideIn .3s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.log-icon{font-size:.85rem;flex-shrink:0}
.log-text{font-family:'JetBrains Mono',monospace;font-size:.7rem;line-height:1.5;color:#94a3b8}
.log-tag{font-size:.6rem;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:4px;text-transform:uppercase}
.tag-classify{background:rgba(139,92,246,.2);color:#a78bfa}
.tag-retrieve{background:rgba(245,158,11,.2);color:#fbbf24}
.tag-synthesize{background:rgba(16,185,129,.2);color:#34d399}
.tag-system{background:rgba(99,102,241,.15);color:#818cf8}

.answer-card{margin:12px 16px;padding:12px;background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);border-radius:8px;display:none;animation:fadeUp .4s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.answer-card .ans-label{font-size:.62rem;font-weight:700;color:#34d399;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.answer-card .ans-text{font-size:.78rem;line-height:1.6;color:#e2e8f0}

/* RIGHT PANEL */
.right{flex:1;overflow:auto;padding:20px 24px;display:flex;flex-direction:column}
.diagram-label{font-size:.65rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
#svg-wrap{width:100%;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.09);border-radius:18px;padding:16px}
svg{width:100%;overflow:visible}

/* Node styles */
.n rect{stroke-width:2;transition:all .5s}
.n.idle rect{fill:#0d1a36;stroke:rgba(255,255,255,0.18);rx:14;ry:14}
.n.active rect{fill:rgba(99,102,241,.3);stroke:#818cf8;stroke-width:2.5;filter:drop-shadow(0 0 18px rgba(99,102,241,.65));rx:14;ry:14}
.n.done rect{fill:rgba(16,185,129,.2);stroke:#34d399;stroke-width:2;rx:14;ry:14}
.n.skip rect{fill:#07101f;stroke:rgba(255,255,255,0.05);opacity:.3;rx:14;ry:14}
.n .icon{font-size:19px}
.n .title{font-family:'Inter',sans-serif;font-size:13px;font-weight:700;fill:#e2e8f0}
.n .sub{font-family:'Inter',sans-serif;font-size:10px;fill:#64748b}
.pulse{fill:none;stroke:#818cf8;stroke-width:2;opacity:0;pointer-events:none}
.n.active .pulse{animation:pulse 1.3s ease-out infinite}
@keyframes pulse{0%{r:26px;opacity:.7}100%{r:56px;opacity:0}}

/* Intent pills in SVG */
.intent-tag{font-family:'Inter',sans-serif;font-size:11px;font-weight:700}
.intent-tag.active-intent{fill:rgba(99,102,241,.4);stroke:#818cf8;stroke-width:1.5}
.intent-tag.inactive-intent{fill:rgba(255,255,255,.04);stroke:rgba(255,255,255,.1);stroke-width:1}

/* Edge */
.edge{fill:none;stroke:rgba(148,163,184,.35);stroke-width:2.5;stroke-dasharray:8 5;transition:stroke .4s,stroke-width .4s,stroke-dasharray .4s}
.edge.active-edge{stroke:#818cf8;stroke-width:3;stroke-dasharray:none;filter:drop-shadow(0 0 4px rgba(129,140,248,.6))}
.edge.done-edge{stroke:#34d399;stroke-width:2.5;stroke-dasharray:none}

/* Status bar */
.status{padding:8px 24px;border-top:1px solid rgba(255,255,255,.07);background:#07122a;display:flex;align-items:center;gap:8px;font-size:.72rem;color:#475569;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;background:#475569;flex-shrink:0}
.dot.running{background:#6366f1;animation:blink 1s infinite}
.dot.done { background: #10b981; box-shadow: 0 0 10px #10b981; }

@keyframes blink{50%{opacity:.2}}
::-webkit-scrollbar{width:4px;background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
</style>
</head>
<body>

<div class="header">
  <span style="font-size:1.2rem">🤖</span>
  <h1>Generic AI Copilot</h1>
  <span class="badge">DEV CONSOLE</span>
  <span class="session-id" id="sid">—</span>
</div>
<div class="body">
  <div class="left">
    <div class="query-area">
      <label>Debug Query</label>
      <textarea id="qinput" rows="3" placeholder="e.g. Can you summarize the documents?"></textarea>
      <button class="run-btn" id="runbtn" onclick="run()">🚀 Run Live Trace</button>
    </div>
    <div class="intent-display" id="intent-display">
      <label>Detected Intent</label>
      <div class="intent-pill" id="intent-pill">—</div>
    </div>
    <div class="log-area">
      <label>⚡ Live Event Log</label>
      <div id="loglist"></div>
    </div>
    <div class="answer-card" id="answer-card">
      <div class="ans-label">✅ Final Answer</div>
      <div class="ans-text" id="answer-text"></div>
    </div>
  </div>
  <div class="right">
    <div class="diagram-label">📊 Live Workflow</div>
    <div id="svg-wrap"><svg id="diagram"></svg></div>
  </div>
</div>
<div class="status">
  <div class="dot" id="sdot"></div>
  <span id="stxt">Ready — enter a query and click Run Live Trace</span>
</div>

<script>
const API = '';
let SID = localStorage.getItem('rag_sid') || crypto.randomUUID();
localStorage.setItem('rag_sid', SID);
document.getElementById('sid').textContent = 'session: ' + SID.slice(0,8) + '…';

// ──────────────────────────────────────────────
// NODE DEFINITIONS
// ──────────────────────────────────────────────
const NW = 170, NH = 68;

const NODES = [
  {id:'user',            icon:'👤', title:'User Query',          sub:'input',                   x:350, y:70},
  {id:'fastapi',         icon:'⚡', title:'FastAPI',             sub:'/chat/stream',             x:230, y:220},
  {id:'orchestrator',    icon:'🧠', title:'Orchestrator',        sub:'LangGraph state machine',  x:110, y:370},
  {id:'process_image',   icon:'👁️', title:'Vision Agent',        sub:'Process Image',            x:330, y:370},

  {id:'extract_memory',  icon:'💾', title:'Memory Extraction',   sub:'Extract Context',          x:550, y:370},
  {id:'classify_intent', icon:'🔍', title:'Intent Classifier',   sub:'LLM classifier',           x:770, y:370},
  {id:'dispatch_tool',   icon:'🛠️', title:'Tool Dispatcher',     sub:'Execute Tool',             x:550, y:70},
  {id:'synthesize',      icon:'✍️', title:'Synthesis Agent',     sub:'Generate answer',          x:550, y:220},
  {id:'guardrail_check', icon:'🛡️', title:'Guardrail Evaluator', sub:'Safety Check',             x:550, y:520},

  {id:'answer',          icon:'💬', title:'Answer',              sub:'Streamed to user',         x:550, y:670},
];

const INTENT_PILLS = [
  {id:'i_policy',      label:'POLICY_Q_A',         x:30, y:30,  w:160, h:28},
  {id:'i_cost',        label:'COST_ESTIMATION',    x:30, y:68,  w:160, h:28},
  {id:'i_contractor',  label:'CONTRACTOR_LOOKUP',  x:30, y:106, w:160, h:28},
  {id:'i_claim',       label:'CLAIM_STATUS',       x:30, y:144, w:160, h:28},
  {id:'i_outofscope',  label:'OUT_OF_SCOPE',       x:30, y:182, w:160, h:28},
];

const EDGES = [
  ['user','fastapi'],['fastapi','orchestrator'],['orchestrator','process_image'],
  ['process_image','extract_memory'],
  ['extract_memory','classify_intent'],
  ['classify_intent','dispatch_tool'],
  ['dispatch_tool','synthesize'],
  ['synthesize','guardrail_check'],
  ['guardrail_check','answer']
];

// ──────────────────────────────────────────────
// BUILD SVG
// ──────────────────────────────────────────────
const svg = d3.select('#diagram');
const VW = 1050, VH = 900;
svg.attr('viewBox', `0 0 ${VW} ${VH}`);

svg.append('defs').append('marker')
  .attr('id','arr').attr('viewBox','0 -6 12 12')
  .attr('refX',10).attr('refY',0).attr('markerWidth',8).attr('markerHeight',8)
  .attr('orient','auto')
  .append('path').attr('d','M0,-6L12,0L0,6').attr('fill','rgba(148,163,184,.5)');

const cx = n => n.x + NW/2;
const cy = n => n.y + NH/2;
const nm = {};  NODES.forEach(n=>nm[n.id]=n);

const edgeG = svg.append('g');
const edgeSel = {};
EDGES.forEach(([f,t],i)=>{
  const fn=nm[f], tn=nm[t]; if(!fn||!tn) return;
  const x1=cx(fn), y1=cy(fn), x2=cx(tn), y2=cy(tn);
  const mx=(x1+x2)/2;
  const p = edgeG.append('path')
    .attr('id',`e${i}`).attr('class','edge')
    .attr('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`)
    .attr('marker-end','url(#arr)');
  edgeSel[`${f}→${t}`]=p;
});

const pillG = svg.append('g');
const pillSel={};
INTENT_PILLS.forEach(p=>{
  const g=pillG.append('g').attr('id',`pill-${p.id}`);
  g.append('rect').attr('x',p.x).attr('y',p.y).attr('width',p.w).attr('height',p.h)
   .attr('rx',10).attr('class','intent-tag inactive-intent');
  g.append('text').attr('x',p.x+p.w/2).attr('y',p.y+p.h/2+4)
   .attr('text-anchor','middle').attr('fill','#64748b')
   .attr('font-family','Inter,sans-serif').attr('font-size',11).attr('font-weight',700)
   .text(p.label);
  pillSel[p.id]=g;
});

const nodeG = svg.append('g');
const nodeSel = {};
NODES.forEach(n=>{
  const g=nodeG.append('g').attr('id',`nd-${n.id}`).attr('class','n idle');
  g.append('rect').attr('x',n.x).attr('y',n.y).attr('width',NW).attr('height',NH);
  g.append('circle').attr('cx',n.x+NW/2).attr('cy',n.y+NH/2).attr('class','pulse');
  g.append('text').attr('class','icon').attr('x',n.x+20).attr('y',n.y+NH/2+6).text(n.icon);
  g.append('text').attr('class','title').attr('x',n.x+45).attr('y',n.y+NH/2-8).text(n.title);
  g.append('text').attr('class','sub').attr('x',n.x+45).attr('y',n.y+NH/2+13).text(n.sub);
  nodeSel[n.id]=g;
});

// ──────────────────────────────────────────────
// STATE HELPERS
// ──────────────────────────────────────────────
function setNode(id, state){
  const g=nodeSel[id]; if(!g) return;
  g.attr('class',`n ${state}`);
}
function activateEdge(f,t){
  const k=`${f}→${t}`;
  if(edgeSel[k]) edgeSel[k].attr('class','edge active-edge');
}
function doneEdge(f,t){
  const k=`${f}→${t}`;
  if(edgeSel[k]) edgeSel[k].attr('class','edge done-edge');
}
function setIntent(intentStr){
  const map={POLICY_Q_A:'i_policy',COST_ESTIMATION:'i_cost',CONTRACTOR_LOOKUP:'i_contractor',CLAIM_STATUS:'i_claim',OUT_OF_SCOPE:'i_outofscope'};
  INTENT_PILLS.forEach(p=>{
    const g=pillSel[p.id]; if(!g) return;
    const active=map[intentStr]===p.id;
    g.select('rect').attr('class',`intent-tag ${active?'active-intent':'inactive-intent'}`);
    g.select('text').attr('fill', active?'#a5b4fc':'#475569');
  });
  document.getElementById('intent-display').style.display='block';
  const colors={POLICY_Q_A:'#2563eb',COST_ESTIMATION:'#d97706',CONTRACTOR_LOOKUP:'#059669',CLAIM_STATUS:'#7c3aed',OUT_OF_SCOPE:'#ef4444'};
  const pill=document.getElementById('intent-pill');
  pill.textContent=intentStr;
  pill.style.background=`${colors[intentStr]||'#6366f1'}33`;
  pill.style.color=colors[intentStr]||'#a5b4fc';
  pill.style.borderColor=`${colors[intentStr]||'#6366f1'}55`;
}

function resetAll(){
  NODES.forEach(n=>setNode(n.id,'idle'));
  EDGES.forEach(([f,t])=>{const k=`${f}→${t}`;if(edgeSel[k])edgeSel[k].attr('class','edge')});
  INTENT_PILLS.forEach(p=>{
    pillSel[p.id].select('rect').attr('class','intent-tag inactive-intent');
    pillSel[p.id].select('text').attr('fill','#475569');
  });
  document.getElementById('loglist').innerHTML='';
  document.getElementById('answer-card').style.display='none';
  document.getElementById('answer-text').textContent='';
  document.getElementById('intent-display').style.display='none';
}

function addLog(icon, tag, tagClass, text){
  const d=document.createElement('div');
  d.className='log-entry';
  d.innerHTML=`<span class="log-icon">${icon}</span><div class="log-text"><span class="log-tag ${tagClass}">${tag}</span>${text}</div>`;
  const ll=document.getElementById('loglist');
  ll.appendChild(d);
  ll.scrollTop=ll.scrollHeight;
}

function setStatus(txt,state=''){
  document.getElementById('stxt').textContent=txt;
  document.getElementById('sdot').className=`dot ${state}`;
}

// ──────────────────────────────────────────────
// RUN TRACE
// ──────────────────────────────────────────────
async function run(){
  const q=document.getElementById('qinput').value.trim();
  if(!q){alert('Enter a query first!');return;}
  resetAll();
  const btn=document.getElementById('runbtn');
  btn.disabled=true;
  setStatus('Connecting…','running');

  let activeNodeIds=[];
  let currentIntent='';
  let prevNode = '';

  try{
    const url=`${API}/chat/stream?session_id=${encodeURIComponent(SID)}&query=${encodeURIComponent(q)}`;
    const resp=await fetch(url);
    const reader=resp.body.getReader();
    const dec=new TextDecoder();
    let buf='';

    while(true){
      const {value,done}=await reader.read();
      if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        const raw=line.slice(6).trim();
        if(raw==='[DONE]'){
          activeNodeIds.forEach(id=>setNode(id,'done'));
          if (prevNode) doneEdge(prevNode, 'answer');
          setNode('answer','done');
          setStatus('✅ Workflow complete!','done');
          break;
        }
        try{
          const ev=JSON.parse(raw);
          handleEvent(ev);
          if(ev.intent) currentIntent=ev.intent;
        }catch(_){}
      }
    }
  }catch(err){
    setStatus('❌ Error: '+err.message,'');
    addLog('❌','ERROR','tag-system',err.message);
  }finally{
    btn.disabled=false;
  }

  function handleEvent(ev){
    const {type,node,intent,step,msg,answer,steps}=ev;

    if(intent && intent!==currentIntent){
      currentIntent=intent;
      setIntent(intent);
    }

    if(type==='node_start'){
      activeNodeIds.forEach(id=>setNode(id,'done'));
      let diagramNodes = [node];
      if(node==='user'){
          setNode('user','active');activeNodeIds=['user'];activateEdge('user','fastapi');
          setTimeout(()=>{
              setNode('user','done'); setNode('fastapi','active'); activateEdge('fastapi','orchestrator');
              setTimeout(()=>{
                  setNode('fastapi','done'); setNode('orchestrator','active'); activateEdge('orchestrator','process_image');
                  prevNode = 'orchestrator';
              }, 400);
          }, 400);
      }
      else{
        if (prevNode === 'user' || !prevNode) prevNode = 'orchestrator';
        diagramNodes.forEach(id=>{setNode(id,'active');activateEdge(prevNode,id);});
        activeNodeIds=diagramNodes;
        prevNode = node;
      }
      const tagClass='tag-system';
      addLog('▶','START',tagClass,node+(msg?' — '+msg:''));
      setStatus(`Running: ${node}…`,'running');
    }

    if(type==='substep'){
      addLog('→','STEP','tag-system',step||'');
    }

    if(type==='node_done'){
      if(node==='evaluate_answer' && answer){
        document.getElementById('answer-text').textContent=answer;
        document.getElementById('answer-card').style.display='block';
      }
      addLog('✅','DONE','tag-system',`${node} complete`);
    }

    if(type==='error'){
      addLog('❌','ERROR','tag-system',msg);
      setStatus('❌ Error: '+msg,'');
    }
  }
}

document.getElementById('qinput').addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))run();});
</script>
</body>
</html>
